<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="0.55" stop-color="#050504"/>
      <stop offset="1" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="180" x2="600" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DEDBC8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#DEDBC8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rule" x1="80" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DEDBC8" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#DEDBC8" stop-opacity="0.35"/>
      <stop offset="0.8" stop-color="#DEDBC8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#DEDBC8" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#DEDBC8" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#DEDBC8" fill-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" filter="url(#noise)" opacity="0.6"/>
  <ellipse cx="600" cy="315" rx="420" ry="220" fill="url(#glow)"/>

  <rect x="48" y="48" width="1104" height="534" rx="24" stroke="#DEDBC8" stroke-opacity="0.1" stroke-width="1"/>

  <text x="600" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="180" font-weight="700" fill="#E1E0CC" letter-spacing="-12" filter="url(#softGlow)">ganar</text>

  <text x="600" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#DEDBC8" fill-opacity="0.5" letter-spacing="0.5">Estados posibles. Elecci&#243;n propia.</text>

  <line x1="88" y1="548" x2="1112" y2="548" stroke="url(#rule)" stroke-width="1"/>
  <text x="88" y="576" font-family="monospace" font-size="13" letter-spacing="2" fill="#DEDBC8" fill-opacity="0.65">ganar.com.ar</text>
</svg>
